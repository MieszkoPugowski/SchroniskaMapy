<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit Haven — Schroniska Górskie</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --moss:#2d4a2d;--moss2:#3a5c3a;--fern:#4a7c59;--sage:#7aab82;
  --mint:#b8d8be;--cream:#f5f0e8;--cream2:#ede5d5;--bark:#6b4f35;
  --leaf:#a8c5a0;--dew:rgba(184,216,190,0.18);
  --shadow:0 4px 24px rgba(30,50,30,0.13);
  --shadow-lg:0 12px 48px rgba(30,50,30,0.18);
  --r:10px;--r-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--moss);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%234a7c59' stroke-width='0.4' opacity='0.1'%3E%3Cpath d='M0 20h80M0 40h80M0 60h80M20 0v80M40 0v80M60 0v80'/%3E%3C/g%3E%3C/svg%3E");
  background-size:80px 80px;}

/* HEADER */
header{position:sticky;top:0;z-index:600;height:68px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,240,232,0.93);backdrop-filter:blur(16px);border-bottom:1.5px solid rgba(74,124,89,0.1);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:42px;height:42px;background:linear-gradient(145deg,var(--moss),var(--fern));border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(45,74,45,0.15);}
.logo-mark svg{width:24px;height:24px;}
.logo-wordmark{display:flex;flex-direction:column;line-height:1.1;}
.logo-wordmark .brand{font-family:'Lora',serif;font-size:1.25rem;font-weight:700;color:var(--moss);}
.logo-wordmark .sub{font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--fern);font-weight:600;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{border:1.5px solid rgba(74,124,89,0.22);background:transparent;color:var(--moss2);padding:8px 18px;border-radius:999px;cursor:pointer;font-family:'Nunito';font-size:0.82rem;font-weight:700;transition:all 0.18s;text-decoration:none;}
.nav-btn:hover{background:var(--dew);border-color:var(--fern);color:var(--fern);}
.nav-btn.primary{background:var(--moss);border-color:var(--moss);color:var(--cream);}
.nav-btn.primary:hover{background:var(--moss2);}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;background:var(--dew);border:1.5px solid rgba(74,124,89,0.2);border-radius:999px;cursor:pointer;transition:all 0.2s;}
.user-chip:hover{background:rgba(74,124,89,0.12);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--fern),var(--moss));display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:white;}
.user-label{font-size:0.82rem;font-weight:700;color:var(--moss);}

/* HERO */
.hero{position:relative;z-index:1;padding:64px 48px 44px;max-width:1640px;margin:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.hero-left{max-width:680px;}
.hero-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(74,124,89,0.1);border:1px solid rgba(74,124,89,0.2);border-radius:999px;padding:5px 14px;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--fern);font-weight:700;}
.hero h2{font-family:'Lora',serif;font-size:clamp(2.4rem,5vw,4rem);line-height:1.1;color:var(--moss);margin-bottom:14px;}
.hero h2 em{font-style:italic;color:var(--fern);}
.hero-desc{color:var(--fern);font-size:0.95rem;line-height:1.75;max-width:480px;opacity:0.8;}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-num{font-family:'Lora',serif;font-size:2rem;font-weight:700;color:var(--moss);line-height:1;}
.stat-label{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--fern);opacity:0.7;margin-top:4px;}

/* GEO PROGRESS BAR */
.geo-bar{position:fixed;bottom:0;left:0;right:0;z-index:800;background:var(--moss);color:var(--cream);padding:10px 24px;font-size:0.78rem;font-weight:700;display:flex;align-items:center;gap:16px;transform:translateY(100%);transition:transform 0.3s;}
.geo-bar.visible{transform:translateY(0);}
.geo-progress{flex:1;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
.geo-progress-fill{height:100%;background:var(--mint);border-radius:2px;transition:width 0.4s;}

/* SEARCH */
.search-bar{position:relative;z-index:1;max-width:1640px;margin:0 auto;padding:0 48px 24px;display:flex;gap:10px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:240px;position:relative;}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none;}
#searchInput{width:100%;padding:13px 16px 13px 46px;background:white;border:1.5px solid rgba(74,124,89,0.18);border-radius:var(--r);font-family:'Nunito';font-size:0.9rem;color:var(--moss);outline:none;transition:all 0.18s;}
#searchInput:focus{border-color:var(--fern);box-shadow:0 0 0 3px rgba(74,124,89,0.1),var(--shadow);}
#searchInput::placeholder{color:rgba(74,124,89,0.4);}
.filter-sel{padding:13px 16px;background:white;border:1.5px solid rgba(74,124,89,0.18);border-radius:var(--r);font-family:'Nunito';font-size:0.85rem;color:var(--moss);outline:none;cursor:pointer;transition:all 0.18s;}

/* TABS */
.tabs{display:flex;max-width:1640px;margin:0 auto;padding:0 48px;border-bottom:1.5px solid rgba(74,124,89,0.13);position:relative;z-index:1;}
.tab-btn{background:none;border:none;color:rgba(45,74,45,0.45);font-family:'Nunito';font-size:0.85rem;font-weight:700;letter-spacing:0.04em;padding:13px 22px;cursor:pointer;position:relative;transition:color 0.18s;}
.tab-btn:hover{color:var(--fern);}
.tab-btn.active{color:var(--moss);}
.tab-btn.active::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:2.5px;background:var(--fern);border-radius:2px;}
.tab-pill{display:inline-flex;align-items:center;justify-content:center;background:rgba(74,124,89,0.1);color:var(--fern);border-radius:999px;min-width:20px;height:20px;padding:0 6px;font-size:0.68rem;font-weight:700;margin-left:6px;}

/* MAIN */
.main-container{position:relative;z-index:1;max-width:1640px;margin:0 auto;padding:28px 48px 80px;display:grid;grid-template-columns:1fr 500px;gap:28px;}
.listing-section{display:flex;flex-direction:column;gap:18px;}

/* CARD */
.card{background:white;border-radius:var(--r-lg);border:1.5px solid rgba(74,124,89,0.1);overflow:hidden;display:grid;grid-template-columns:260px 1fr;box-shadow:var(--shadow);transition:transform 0.18s,box-shadow 0.18s;}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.card.highlighted{border-color:var(--fern);box-shadow:0 0 0 3px rgba(74,124,89,0.18),var(--shadow-lg);}
.card-img-wrap{position:relative;overflow:hidden;height:100%;min-height:210px;}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
.card:hover .card-img{transform:scale(1.05);}
.img-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(30,55,30,0.55),rgba(30,55,30,0.05) 60%);}
.card-badge{position:absolute;bottom:12px;left:12px;background:rgba(245,240,232,0.92);color:var(--moss);font-size:0.65rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;border-radius:6px;}
.fav-btn{position:absolute;top:11px;right:11px;width:32px;height:32px;border-radius:50%;background:rgba(245,240,232,0.88);border:none;cursor:pointer;font-size:0.95rem;z-index:2;transition:transform 0.15s;}
.fav-btn:hover{transform:scale(1.15);}
.card-body{padding:20px 22px;display:flex;flex-direction:column;}
.card-name{font-family:'Lora',serif;font-size:1.2rem;font-weight:700;color:var(--moss);line-height:1.25;margin-bottom:8px;}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.meta-tag{display:flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--fern);font-weight:600;}
.card-divider{height:1px;background:rgba(74,124,89,0.08);margin:8px 0;}
.card-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto;padding-top:10px;}
.btn{border:none;cursor:pointer;font-family:'Nunito';font-weight:700;font-size:0.76rem;letter-spacing:0.03em;padding:8px 14px;border-radius:8px;transition:all 0.18s;white-space:nowrap;}
.btn-green{background:var(--moss);color:var(--cream);}
.btn-green:hover{background:var(--moss2);}
.btn-outline{background:transparent;border:1.5px solid rgba(74,124,89,0.22);color:var(--fern);}
.btn-outline:hover{background:var(--dew);border-color:var(--fern);}

/* SIDEBAR */
.sidebar{position:sticky;top:88px;height:calc(100vh - 108px);display:flex;flex-direction:column;gap:14px;}
.map-shell{flex:1;border-radius:var(--r-lg);overflow:hidden;border:1.5px solid rgba(74,124,89,0.15);box-shadow:var(--shadow-lg);position:relative;min-height:460px;}
.map-top-label{position:absolute;top:13px;left:13px;z-index:999;background:rgba(245,240,232,0.92);border-radius:999px;padding:6px 14px;font-size:0.69rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--fern);font-weight:700;}
#map{width:100%;height:100%;}

/* MAP ROUND MARKER IMAGE */
.map-photo-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 4px 12px rgba(30,50,30,0.35);
  overflow: hidden;
  background: linear-gradient(135deg, var(--moss), var(--fern));
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.map-photo-icon:hover {
  transform: scale(1.12);
  z-index: 1000 !important;
}
.map-photo-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.map-photo-icon svg {
  width: 20px;
  height: 20px;
  opacity: 0.9;
}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--moss);color:var(--cream);padding:11px 22px;border-radius:999px;font-size:0.8rem;font-weight:700;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(15,30,15,0.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--cream);border-radius:20px;width:100%;max-width:480px;box-shadow:0 24px 80px rgba(10,30,10,0.3);border:1.5px solid rgba(74,124,89,0.15);transform:scale(0.94) translateY(16px);transition:transform 0.2s;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-header{padding:24px 26px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--cream);z-index:1;border-bottom:1px solid rgba(74,124,89,0.08);}
.modal-title{font-family:'Lora',serif;font-size:1.35rem;font-weight:700;color:var(--moss);line-height:1.2;}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--fern);opacity:0.6;transition:opacity 0.15s;line-height:1;padding:4px;}
.modal-close:hover{opacity:1;}
.modal-body{padding:18px 26px 26px;}

/* LOGIN MODAL */
.auth-tabs{display:flex;margin-bottom:20px;background:rgba(74,124,89,0.06);border-radius:10px;padding:4px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;cursor:pointer;font-family:'Nunito';font-size:0.82rem;font-weight:700;color:rgba(45,74,45,0.5);border-radius:8px;transition:all 0.2s;}
.auth-tab.active{background:white;color:var(--moss);box-shadow:0 2px 8px rgba(45,74,45,0.1);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--fern);margin-bottom:5px;}
.field input{width:100%;padding:10px 13px;background:white;border:1.5px solid rgba(74,124,89,0.18);border-radius:var(--r);font-family:'Nunito';font-size:0.88rem;color:var(--moss);outline:none;transition:all 0.18s;}
.field input:focus{border-color:var(--fern);}
.btn-full{width:100%;padding:12px;font-size:0.88rem;border-radius:10px;margin-top:4px;}
.social-btns{display:flex;gap:8px;margin-top:12px;}
.social-btn{flex:1;padding:9px;background:white;border:1.5px solid rgba(74,124,89,0.18);border-radius:8px;cursor:pointer;font-family:'Nunito';font-size:0.73rem;font-weight:700;color:var(--moss);transition:all 0.18s;}
.social-btn:hover{background:var(--dew);border-color:var(--fern);}
.auth-divider{text-align:center;font-size:0.72rem;color:var(--fern);opacity:0.5;margin:14px 0 4px;}

/* DETAILS MODAL */
.dmodal{max-width:660px;}
.dmodal-img{width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:16px;}
.chips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-bottom:14px;}
.chip{background:white;border:1px solid rgba(74,124,89,0.12);border-radius:10px;padding:11px 13px;}
.chip-label{font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--fern);margin-bottom:4px;font-weight:700;}
.chip-val{font-size:0.82rem;color:var(--moss);font-weight:600;line-height:1.3;}
.dmodal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(74,124,89,0.08);}

@media(max-width:1200px){.main-container{grid-template-columns:1fr;}.sidebar{position:relative;top:auto;height:460px;}}
@media(max-width:720px){.card{grid-template-columns:1fr;}.card-img-wrap{height:190px;}header{padding:0 16px;}.hero{padding:36px 16px 24px;}.search-bar,.tabs,.main-container{padding-left:16px;padding-right:16px;}}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 19L8 10L12 15L16 8L21 19" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="logo-wordmark">
      <span class="brand">Summit Haven</span>
      <span class="sub">schroniska · noclegi · trasy</span>
    </div>
  </a>
  <div class="nav-right">
    <a class="nav-btn" href="planer-trasy.html" target="_blank" id="btnPlanRoute">🗺 Planuj trasę</a>
    <button class="nav-btn primary" id="btnLogin">Zaloguj się</button>
    <div class="user-chip" id="userChip" style="display:none" onclick="logoutPrompt()">
      <div class="user-avatar" id="uAvatar"></div>
      <span class="user-label" id="uName"></span>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-left">
    <h2>Twoje miejsce<br>w <em>dziczy</em></h2>
    <p class="hero-desc">Przeglądaj schroniska, zapisuj ulubione i planuj trasy.</p>
  </div>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="heroCount">0</div><div class="stat-label">Schronisk</div></div>
    <div class="stat"><div class="stat-num" id="favCount">0</div><div class="stat-label">Ulubionych</div></div>
  </div>
</section>

<div class="search-bar">
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Szukaj schroniska, lokalizacji, pasma...">
  </div>
  <select class="filter-sel" id="pasmSel"><option value="">Wszystkie pasma</option></select>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all',this)">Wszystkie <span class="tab-pill" id="cAll">0</span></button>
  <button class="tab-btn" onclick="switchTab('fav',this)">❤️ Ulubione <span class="tab-pill" id="cFav">0</span></button>
</div>

<div class="main-container">
  <div class="listing-section" id="listing"></div>
  <div class="sidebar">
    <div class="map-shell">
      <div class="map-top-label">📍 Mapa schronisk</div>
      <div id="map"></div>
    </div>
  </div>
</div>

<div class="geo-bar" id="geoBar">
  <span id="geoMsg">⛰ Wyszukuję współrzędne...</span>
  <div class="geo-progress"><div class="geo-progress-fill" id="geoFill" style="width:0%"></div></div>
  <span id="geoPct">0%</span>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="loginTitle">Witaj z powrotem</span>
      <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">Logowanie</button>
        <button class="auth-tab" id="tabReg" onclick="switchAuth('register')">Rejestracja</button>
      </div>
      <div id="formLogin">
        <div class="field"><label>E-mail</label><input type="email" id="lEmail" placeholder="twoj@email.pl"></div>
        <div class="field"><label>Hasło</label><input type="password" id="lPass" placeholder="••••••••"></div>
        <button class="btn btn-green btn-full" onclick="doLogin()">Zaloguj się 🌿</button>
      </div>
      <div id="formReg" style="display:none">
        <div class="field"><label>Imię i nazwisko</label><input type="text" id="rName" placeholder="Jan Kowalski"></div>
        <div class="field"><label>E-mail</label><input type="email" id="rEmail" placeholder="twoj@email.pl"></div>
        <div class="field"><label>Hasło (min. 6 znaków)</label><input type="password" id="rPass" placeholder="••••••••"></div>
        <button class="btn btn-green btn-full" onclick="doRegister()">Załóż konto 🌿</button>
      </div>
      <div class="auth-divider">lub kontynuuj przez</div>
      <div class="social-btns">
        <button class="social-btn" onclick="mockSocial('Google')">🔵 Google</button>
        <button class="social-btn" onclick="mockSocial('Facebook')">🔷 Facebook</button>
        <button class="social-btn" onclick="mockSocial('Apple')">🍎 Apple</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailsModal">
  <div class="modal dmodal">
    <div class="modal-header">
      <span class="modal-title" id="dmName">Szczegóły</span>
      <button class="modal-close" onclick="closeModal('detailsModal')">✕</button>
    </div>
    <div class="modal-body">
      <img id="dmImg" class="dmodal-img" src="" alt="" onerror="this.src=FB[0]">
      <div class="chips-grid" id="dmChips"></div>
      <div class="dmodal-actions" id="dmActions"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COL = {
  name:'Nazwa schroniska',range:'Pasmo górskie',alt:'Wysokość n.p.m.',places:'Liczba dostępnych miejsc',rating:'Ocena gości',price:'Ceny noclegu',
  loc:'Lokalizacja',season:'Terminy otwarcia',email:'E-mail',phone:'Telefon',
  room1:'Pokoje jednoosobowe',room2:'Pokoje 2-osobowe',room3:'Pokoje 3-osobowe',room4:'Pokoje 4-osobowe',
  roomX:'Pokoje wieloosobowe',bedding:'Pościel czy śpiwór',food:'Wyżywienie',
  pets:'Czy można nocować zwierzę',photo:'Zdjęcie',
};

const GEO_COL = {name:'Nazwa schroniska',lat:'lat',lon:'lon'};
let geoRows=[];
function toCoord(v){const n=parseFloat(String(v).replace(',', '.'));return Number.isFinite(n)?n:null;}
function hydrateGeoCache(rows){for(const row of rows){const name=sv(row[GEO_COL.name]??row[COL.name]);const lat=toCoord(row[GEO_COL.lat]);const lon=toCoord(row[GEO_COL.lon]);if(name&&lat!==null&&lon!==null)geoCache[name]={lat,lon};}}
async function loadSheetRows(file){const res=await fetch(file);if(!res.ok)throw new Error('not ok');const buf=await res.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);}

let allData=[],geoCache={},favourites=new Set(),currentUser=null,currentTab='all',mapMarkers={};
try{geoCache=JSON.parse(localStorage.getItem('sh_geo')||'{}');}catch(e){}
try{favourites=new Set(JSON.parse(localStorage.getItem('sh_favs')||'[]'));}catch(e){}
try{currentUser=JSON.parse(localStorage.getItem('sh_user')||'null');}catch(e){}

function sv(v){if(v===null||v===undefined)return '';const s=String(v).trim();return(s===''||s==='NaN'||s==='N/A'||s==='0')?'':s;}
function cleanNum(v){if(v===null||v===undefined)return '';const s=String(v).trim();if(s.toUpperCase()==='TAK')return '✓';const n=parseFloat(s);if(isNaN(n)||n<=0)return '';return String(Math.round(n));}
function saveFavs(){try{localStorage.setItem('sh_favs',JSON.stringify([...favourites]));}catch(e){}}
function saveGeo(){try{localStorage.setItem('sh_geo',JSON.stringify(geoCache));}catch(e){}}
function saveUser(){try{localStorage.setItem('sh_user',JSON.stringify(currentUser));}catch(e){}}
function toast(msg,dur=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

const FB=['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=900&auto=format&fit=crop','https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=900&auto=format&fit=crop','https://images.unsplash.com/photo-1469022563149-aa64dbd37dae?q=80&w=900&auto=format&fit=crop'];

function imgSrc(row, i) {
  const f = sv(row[COL.photo]);
  if (f) {
    return f.toLowerCase().startsWith('zdjęcia/') ? f : `Zdjęcia/${f}`;
  }
  return FB[i % FB.length];
}

const mainMap=L.map('map').setView([49.55,20.1],7);
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{attribution:'© OpenTopoMap',maxZoom:17}).addTo(mainMap);

function mkIcon(row, i){
  const src = imgSrc(row, i);
  const fallbackSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 19L8 10L12 15L16 8L21 19" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  
  return L.divIcon({
    className: '',
    html: `<div class="map-photo-icon">
             <img src="${src}" alt="icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
             <div style="display:none; width:100%; height:100%; padding:8px;">${fallbackSvg}</div>
           </div>`,
    iconSize: [44, 44],
    iconAnchor: [22, 22]
  });
}

function clearMarkers(){Object.values(mapMarkers).forEach(m=>mainMap.removeLayer(m));mapMarkers={};}
function addMarker(row,i){const name=sv(row[COL.name]);const coords=geoCache[name];if(!coords)return;const m=L.marker([coords.lat,coords.lon],{icon:mkIcon(row, i)}).bindPopup(`<strong>${name}</strong>`).on('click',()=>focusMarker(name));m.addTo(mainMap);mapMarkers[name]=m;}
function focusMarker(name){const m=mapMarkers[name];if(!m){toast('📍 Brak współrzędnych dla tego schroniska');return;}mainMap.setView(m.getLatLng(),14,{animate:true});m.openPopup();highlightCard(name);}
function highlightCard(name){document.querySelectorAll('.card').forEach(c=>{const on=c.dataset.name===name;c.classList.toggle('highlighted',on);if(on)c.scrollIntoView({behavior:'smooth',block:'center'});});}

async function geocodeAll(data){
  const uncached=data.filter(r=>!geoCache[sv(r[COL.name])]);
  if(!uncached.length){renderCards(getFiltered(currentTab));return;}
  const bar=document.getElementById('geoBar'),msg=document.getElementById('geoMsg'),fill=document.getElementById('geoFill'),pct=document.getElementById('geoPct');
  bar.classList.add('visible');
  const BATCH=30;const toProcess=uncached.slice(0,BATCH);let done=0;
  for(const row of toProcess){
    const name=sv(row[COL.name]);const loc=sv(row[COL.loc]).replace(/\n/g,' ').trim();const query=loc||name;
    try{const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', Polska')}&format=json&limit=1&accept-language=pl`;const res=await fetch(url,{headers:{'Accept-Language':'pl'}});if(res.ok){const j=await res.json();if(j.length>0){const {lat,lon}=j[0];geoCache[name]={lat:parseFloat(lat),lon:parseFloat(lon)};}}}catch(e){}
    done++;const p=Math.round((done/toProcess.length)*100);fill.style.width=p+'%';pct.textContent=p+'%';msg.textContent= `⛰ Geocodowanie ${done}/${toProcess.length}: ${name.substring(0,40)}...`;
    if(done%5===0)renderCards(getFiltered(currentTab));
    await new Promise(r=>setTimeout(r,1100));
  }
  saveGeo();bar.classList.remove('visible');renderCards(getFiltered(currentTab));
  if(uncached.length>BATCH)toast(`📍 Wczytano ${BATCH} lokalizacji. Odśwież stronę, by geocodować więcej.`,4000);
}

function updateCounts(){
  document.getElementById('heroCount').textContent=allData.length;
  document.getElementById('favCount').textContent=favourites.size;
  document.getElementById('cAll').textContent=getFiltered('all').length;
  document.getElementById('cFav').textContent=getFiltered('fav').length;
}

function getFiltered(tab){
  const q=document.getElementById('searchInput').value.toLowerCase();const pasm=document.getElementById('pasmSel').value;
  return allData.filter(r=>{
    const name=sv(r[COL.name]).toLowerCase(),loc=sv(r[COL.loc]).toLowerCase(),range=sv(r[COL.range]).toLowerCase();
    const qOk=!q||name.includes(q)||loc.includes(q)||range.includes(q);const pOk=!pasm||sv(r[COL.range])===pasm;
    const n=sv(r[COL.name]);let tOk=true;
    if(tab==='fav')tOk=favourites.has(n);
    return qOk&&pOk&&tOk;
  });
}

function renderCards(data){
  const sec=document.getElementById('listing');sec.innerHTML='';clearMarkers();updateCounts();
  if(!data.length){sec.innerHTML=`<div style="text-align:center;padding:56px;color:var(--fern);opacity:0.5;">Brak pasujących schronisk.</div>`;return;}
  data.forEach((row,i)=>{
    const name=sv(row[COL.name]),range=sv(row[COL.range]),alt=sv(row[COL.alt]),places=sv(row[COL.places]),rating=sv(row[COL.rating]),price=sv(row[COL.price]);
    const isFav=favourites.has(name);addMarker(row,i);
    const card=document.createElement('div');card.className='card';card.dataset.name=name;
    card.innerHTML=`
      <div class="card-img-wrap">
        <img class="card-img" src="${imgSrc(row,i)}" alt="${name}" loading="lazy" onerror="this.src='${FB[0]}'">
        <div class="img-shade"></div>
        ${range?`<div class="card-badge">${range}</div>`:''}
        <button class="fav-btn" onclick="toggleFav(event,'${esc(name)}')">${isFav?'❤️':'🤍'}</button>
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-meta">
          ${alt?`<div class="meta-tag">🏔️ ${alt}</div>`:''}
          ${places?`<div class="meta-tag">👥 ${places} miejsc</div>`:''}
          ${rating?`<div class="meta-tag">⭐ ${rating}</div>`:''}
          ${price?`<div class="meta-tag">💰 ${price}</div>`:''}
        </div>
        <div class="card-divider"></div>
        <div class="card-actions">
          <button class="btn btn-green" onclick="showOnMap(event,'${esc(name)}')">📍 Mapa</button>
          <button class="btn btn-outline" onclick="openDetails(event,'${esc(name)}')">Szczegóły</button>
          <button class="btn btn-outline" onclick="toggleFav(event,'${esc(name)}')">${isFav?'❤️ Ulubione':'🤍 Dodaj do ulubionych'}</button>
        </div>
      </div>`;
    sec.appendChild(card);
  });
}

function showOnMap(e,name){e.stopPropagation();focusMarker(name);toast(`📍 ${name}`);}
function toggleFav(e,name){e.stopPropagation();if(favourites.has(name)){favourites.delete(name);toast(`💔 Usunięto: ${name}`);}else{favourites.add(name);toast(`❤️ Ulubione: ${name}`);}saveFavs();applyFilters();}

function applyFilters(){renderCards(getFiltered(currentTab));}

function openDetails(e,name){
  e&&e.stopPropagation();const idx=allData.findIndex(r=>sv(r[COL.name])===name);if(idx<0)return;const row=allData[idx];
  document.getElementById('dmName').textContent=name;document.getElementById('dmImg').src=imgSrc(row,idx);
  const fields=[[COL.range,'🏔','Pasmo górskie'],[COL.alt,'🏔️','Wysokość'],[COL.loc,'📍','Lokalizacja'],[COL.season,'📅','Otwarcie'],[COL.places,'👥','Miejsca noclegowe'],[COL.price,'💰','Cena'],[COL.rating,'⭐','Ocena'],[COL.email,'📧','E-mail'],[COL.phone,'☎️','Telefon'],[COL.food,'🍽','Wyżywienie']];
  const rooms=[];if(cleanNum(row[COL.room1]))rooms.push(`1-os: ${cleanNum(row[COL.room1])}`);if(cleanNum(row[COL.room2]))rooms.push(`2-os: ${cleanNum(row[COL.room2])}`);if(cleanNum(row[COL.room3]))rooms.push(`3-os: ${cleanNum(row[COL.room3])}`);if(cleanNum(row[COL.room4]))rooms.push(`4-os: ${cleanNum(row[COL.room4])}`);if(cleanNum(row[COL.roomX]))rooms.push(`Wieloosobowe: ${cleanNum(row[COL.roomX])}`);
  let html=fields.map(([key,icon,label])=>{const v=sv(row[key]);if(!v)return '';return `<div class="chip"><div class="chip-label">${icon} ${label}</div><div class="chip-val">${v}</div></div>`;}).filter(Boolean).join('');
  if(rooms.length)html+=`<div class="chip" style="grid-column:1/-1"><div class="chip-label">🏠 Pokoje</div><div class="chip-val">${rooms.join(' · ')}</div></div>`;
  if(!html)html=`<div class="chip"><div class="chip-label">ℹ️ Info</div><div class="chip-val">Brak dodatkowych danych</div></div>`;
  document.getElementById('dmChips').innerHTML=html;
  document.getElementById('dmActions').innerHTML=`
    <button class="btn btn-green" onclick="showOnMap(event,'${esc(name)}');closeModal('detailsModal')">📍 Pokaż na mapie</button>`;
  openModal('detailsModal');
}

document.getElementById('searchInput').addEventListener('input',applyFilters);
document.getElementById('pasmSel').addEventListener('change',applyFilters);
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();}
function fillPasmSel(){const sel=document.getElementById('pasmSel');[...new Set(allData.map(r=>sv(r[COL.range])).filter(Boolean))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;sel.appendChild(o);});}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModal(o.id);}));
document.getElementById('btnLogin').addEventListener('click',()=>openModal('loginModal'));

function switchAuth(mode){document.getElementById('formLogin').style.display=mode==='login'?'block':'none';document.getElementById('formReg').style.display=mode==='register'?'block':'none';document.getElementById('tabLogin').classList.toggle('active',mode==='login');document.getElementById('tabReg').classList.toggle('active',mode==='register');}
function doLogin(){const email=document.getElementById('lEmail').value.trim(),pass=document.getElementById('lPass').value;if(!email||!pass){toast('Uzupełnij wszystkie pola!');return;}setUser({name:email.split('@')[0],email,role:'user'});closeModal('loginModal');}
function doRegister(){const name=document.getElementById('rName').value.trim(),email=document.getElementById('rEmail').value.trim(),pass=document.getElementById('rPass').value;if(!name||!email||!pass||pass.length<6){toast('Uzupełnij wszystkie pola! Hasło min. 6 znaków.');return;}setUser({name,email,role:'user'});closeModal('loginModal');}
function mockSocial(provider){const n={Google:'Użytkownik Google',Facebook:'Użytkownik Facebook',Apple:'Użytkownik Apple'};setUser({name:n[provider],email:`user@${provider.toLowerCase()}.com`,role:'social'});closeModal('loginModal');}
function setUser(u){currentUser=u;saveUser();document.getElementById('btnLogin').style.display='none';document.getElementById('userChip').style.display='flex';document.getElementById('uAvatar').textContent=currentUser.name.charAt(0).toUpperCase();document.getElementById('uName').textContent=currentUser.name;}
function logoutPrompt(){if(confirm(`Wylogować się? (${currentUser?.name})`)){currentUser=null;try{localStorage.removeItem('sh_user');}catch(e){}document.getElementById('btnLogin').style.display='block';document.getElementById('userChip').style.display='none';};}

async function boot(){
  try{allData=await loadSheetRows('Schroniska_gotowe.xlsx');}catch(e){allData=[];}
  if(allData.length){hydrateGeoCache(allData);}
  if(!allData.length){
    const tryFiles=['Schroniska_Baza.xlsx','Schroniska Baza.xlsx'];
    for(const file of tryFiles){
      try{allData=await loadSheetRows(file);break;}catch(e){}
    }
  }
  if(!allData.length)allData=DEMO;
  init();
}
function init(){fillPasmSel();if(currentUser)setUser(currentUser);updateCounts();renderCards(getFiltered(currentTab));geocodeAll(allData);}
